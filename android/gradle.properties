org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=true
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false

# ── Kotlin incremental cache fix ──────────────────────────────────────────────
# share_plus uses the legacy Kotlin Gradle Plugin (KGP) which writes incremental
# cache .tab files that become locked/corrupted across build sessions.
# Disabling incremental compilation for subprojects eliminates the corrupt cache.
kotlin.incremental=false

# ── Gradle Daemon stability ────────────────────────────────────────────────────
# Stop the Kotlin daemon from keeping stale file locks between build runs.
kotlin.daemon.jvm.options=-Xmx2G
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true

# ── R8 / ProGuard ─────────────────────────────────────────────────────────────
# Enable R8 full mode for better dead code elimination and smaller APK.
android.enableR8.fullMode=true
